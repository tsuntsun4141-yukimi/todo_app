<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat & Star TODO</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-stars"></div>
    
    <div class="todo-container">
        <!-- Cat ears -->
        <div class="cat-ear ear-left"></div>
        <div class="cat-ear ear-right"></div>
        
        <header>
            <h1><i class="fa-solid fa-cat"></i> My TODO</h1>
        </header>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="なにするにゃん？">
            <button id="addButton" aria-label="Add Task">
                <i class="fa-solid fa-paw"></i>
            </button>
        </div>

        <ul id="taskList" class="task-list">
            <!-- Tasks will be added here dynamically -->
        </ul>
        
        <div class="empty-state" id="emptyState">
            <p>タスクはないにゃ！</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
